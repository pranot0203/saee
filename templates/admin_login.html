{% extends "index.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-danger"><i class="fas fa-user-shield me-2"></i>ADMIN LOGIN</h2>
            <p class="text-muted">Election Management System</p>
        </div>

        <div class="card shadow-lg animate__animated animate__fadeInUp border-0" style="border-radius: 15px;">
            <div class="card-body p-5">
                <form action="{{ url_for('admin_login') }}" method="POST">
                    <div class="mb-4">
                        <label for="prn" class="form-label fw-bold">Admin Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-user text-danger"></i></span>
                            <input type="text" class="form-control" id="prn" name="prn" placeholder="Enter Username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-danger"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg rounded-pill shadow-sm">
                            Access Admin Dashboard <i class="fas fa-sign-in-alt ms-2"></i>
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-link text-muted mt-2">
                            <i class="fas fa-arrow-left me-2"></i> Back to Home
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="mt-4 text-center text-muted animate__animated animate__fadeIn animate__delay-1s">
            <small>This area is restricted to authorized election administrators only.</small>
        </div>
    </div>
</div>
{% endblock %}
